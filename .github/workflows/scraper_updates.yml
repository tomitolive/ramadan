name: Ramadan Updates (Hourly)

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour
  workflow_dispatch:

concurrency:
  group: scraper-sync
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Update Check
        continue-on-error: true
        run: python supreme_bot.py --mode updates

      - name: Commit and Push Results
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ramadan_2026_results_*.json || true
          git commit -m "chore: hourly episode update [$(date -u '+%Y-%m-%d %H:%M UTC')]" || echo "No new updates."
          git pull --rebase origin main
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
